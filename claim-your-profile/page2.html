<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Your Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }
    input {
      background: #334155;
      color: #fff;
    }
    button {
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Profile</h2>
    <form id="profileForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <button type="submit">Create Profile</button>
    </form>
    <p id="status"></p>
  </div>

  <script>
    const form = document.getElementById("profileForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;

      // Simulate saving (you can replace this with real backend later)
      status.textContent = "Profile created for " + username + "!";

      // Optional: redirect after creation
      setTimeout(() => {
        window.location.href = "https://eternalxlks1.github.io/";
      }, 2000);
    });
  </script>
</body>
</html>
